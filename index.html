<iframe
  id="unit2ActivityFrame"
  src="https://areej13.github.io/UNIT2/"
  width="100%"
  height="720"
  style="border:0; border-radius:12px; overflow:hidden; display:block; margin:0 auto;"
  scrolling="no"
  allowfullscreen>
</iframe>

<script>
  window.addEventListener("message", function(event) {
    if (!event.data || event.data.type !== "unit2ActivityHeight") return;

    var frame = document.getElementById("unit2ActivityFrame");
    if (!frame) return;

    var newHeight = Math.max(520, Math.min(Number(event.data.height) || 720, 980));
    frame.style.height = newHeight + "px";
    frame.setAttribute("height", String(newHeight));
  });
</script>
